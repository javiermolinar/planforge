name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run plan script smoke tests
        run: bash tests/test-plan-scripts.sh

      - name: Run Pi package smoke tests
        run: bash tests/test-pi-package.sh

  github-release:
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
